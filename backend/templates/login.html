{% extends "base.html" %} {% block title %}Login - Bosto Primary School{%
endblock %} {% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">School Portal Login</h4>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                required
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>

          <hr />

          <div class="alert alert-info">
            <h6>Demo Accounts:</h6>
            <p class="mb-1">👑 <strong>Admin:</strong> admin / admin123</p>
            <p class="mb-1">
              👩‍🏫 <strong>Teacher:</strong> teacher1 / teacher123
            </p>
            <p class="mb-0">
              👨‍🎓 <strong>Student:</strong> student1 / student123
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
